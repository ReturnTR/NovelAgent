<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Novel Agent - 多Agent协作系统</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 64 64" fill="none" style="vertical-align: middle;">
                        <path d="M12 14C12 12.8954 12.8954 12 14 12H42C43.1046 12 44 12.8954 44 14V50C44 51.1046 43.1046 52 42 52H14C12.8954 52 12 51.1046 12 50V14Z" fill="#667eea"/>
                        <path d="M14 12H42V52H14V12Z" fill="#8B9AEB"/>
                        <path d="M16 16H40V48H16V16Z" fill="white"/>
                        <path d="M32 16V48" stroke="#667eea" stroke-width="2"/>
                        <path d="M44 8L50 14L46 18L40 12L44 8Z" fill="#FFC107"/>
                        <path d="M40 12L34 18L30 14L36 8L40 12Z" fill="#FFD54F"/>
                        <path d="M30 14L26 18L34 26L38 22L30 14Z" fill="#FF8F00"/>
                        <path d="M26 18L22 22L30 30L34 26L26 18Z" fill="#FFC107"/>
                        <path d="M30 30L34 26L38 22L42 26L46 22L50 26L50 28L54 32L50 36L46 32L42 36L38 40L34 36L30 40L26 36L22 32L18 28L22 24L26 28L30 30Z" fill="#333"/>
                        <path d="M34 26L30 30L26 36L22 32L18 28L22 24L26 28L30 30Z" fill="#FFD54F"/>
                    </svg>
                    Agents
                </h2>
                <button id="refreshAgents" onclick="refreshAgents()" title="刷新">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
            </div>
            <div class="agent-list" id="agentList">
                <div class="loading">加载中...</div>
            </div>
            <div class="sidebar-footer">
                <button onclick="openCreateAgentDialog()" class="new-agent-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    新建Agent
                </button>
            </div>
        </div>
        <div class="resize-handle" id="resizeHandle"></div>
        
        <div class="main-content">
            <div class="header">
                <h1 id="currentAgentTitle">Supervisor Agent</h1>
                <div class="status" id="status">● 就绪</div>
                <button class="theme-toggle" id="themeToggle" title="切换主题">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
            
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <h2>欢迎使用 Novel Agent！</h2>
                    <p>这是一个多Agent协作的小说创作系统。</p>
                    <p>可用的Agent：</p>
                    <ul>
                        <li><strong>Supervisor</strong> - 主控Agent，协调其他Agent</li>
                        <li><strong>Character</strong> - 人物生成Agent</li>
                        <li><strong>Outline</strong> - 大纲生成Agent</li>
                        <li><strong>Content</strong> - 内容生成Agent</li>
                        <li><strong>Theme</strong> - 主题分析Agent</li>
                    </ul>
                    <p class="example">试试说："创建一个勇敢的男主角"</p>
                </div>
            </div>
            
            <div class="input-container">
                <textarea 
                    id="messageInput" 
                    placeholder="输入你的问题..." 
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button id="sendButton" onclick="sendMessage()">
                    <span>发送</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- 新建Agent对话框 -->
    <div id="createAgentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建Agent</h3>
                <button onclick="closeCreateAgentDialog()" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Agent名称</label>
                    <input type="text" id="agentNameInput" placeholder="请输入Agent名称">
                </div>
                <div class="form-group">
                    <label>Agent类型</label>
                    <select id="agentTypeSelect">
                        <option value="supervisor">Supervisor - 主控</option>
                        <option value="character">Character - 人物</option>
                        <option value="outline">Outline - 大纲</option>
                        <option value="content">Content - 内容</option>
                        <option value="theme">Theme - 主题</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeCreateAgentDialog()" class="btn btn-secondary">取消</button>
                <button onclick="createAgent()" class="btn btn-primary">创建</button>
            </div>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
